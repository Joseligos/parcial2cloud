apiVersion: v1
kind: Namespace
metadata:
  name: microapp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-users
  namespace: microapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-users
  template:
    metadata:
      labels:
        app: mysql-users
    spec:
      restartPolicy: Always
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: root
            - name: MYSQL_DATABASE
              value: users_db
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-users
  namespace: microapp
spec:
  type: ClusterIP
  selector:
    app: mysql-users
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-products
  namespace: microapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-products
  template:
    metadata:
      labels:
        app: mysql-products
    spec:
      restartPolicy: Always
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: root
            - name: MYSQL_DATABASE
              value: products_db
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-products
  namespace: microapp
spec:
  type: ClusterIP
  selector:
    app: mysql-products
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-orders
  namespace: microapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-orders
  template:
    metadata:
      labels:
        app: mysql-orders
    spec:
      restartPolicy: Always
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: root
            - name: MYSQL_DATABASE
              value: orders_db
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-orders
  namespace: microapp
spec:
  type: ClusterIP
  selector:
    app: mysql-orders
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-deploy
  namespace: microapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: users-service
  template:
    metadata:
      labels:
        app: users-service
    spec:
      restartPolicy: Always
      containers:
        - name: users-service
          image: joseligo/users-service:v1.0
          ports:
            - containerPort: 3001
          env:
            - name: MYSQL_HOST
              value: mysql-users
            - name: MYSQL_USER
              value: root
            - name: MYSQL_PASSWORD
              value: root
            - name: MYSQL_DB
              value: users_db
            - name: CONSUL_HOST
              value: localhost
            - name: SERVICE_HOST
              value: users-service
---
apiVersion: v1
kind: Service
metadata:
  name: users-svc
  namespace: microapp
spec:
  type: ClusterIP
  selector:
    app: users-service
  ports:
    - port: 3001
      targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: products-deploy
  namespace: microapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: products-service
  template:
    metadata:
      labels:
        app: products-service
    spec:
      restartPolicy: Always
      containers:
        - name: products-service
          image: joseligo/products-service:v1.0
          ports:
