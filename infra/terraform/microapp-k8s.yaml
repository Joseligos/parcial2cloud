          env:
            - name: MYSQL_HOST
              value: mysql-products
            - name: MYSQL_USER
              value: root
            - name: MYSQL_PASSWORD
              value: root
            - name: MYSQL_DB
              value: products_db
            - name: CONSUL_HOST
              value: localhost
            - name: SERVICE_HOST
