[haproxy]
local-haproxy ansible_host=192.168.80.2 ansible_ssh_private_key_file=/home/vagrant/.ssh/local-haproxy.key

[microservices]
local-microservices ansible_host=192.168.80.3 ansible_ssh_private_key_file=/home/vagrant/.ssh/local-microservices.key

[all:vars]
ansible_user=vagrant
ansible_python_interpreter=/usr/bin/python3
dockerhub_user=joseligo
image_tag=v1.0